labeling_version: "1.0.0"

# Output format untuk LLM training
output_format:
  type: json
  required_fields:
    - kategori
    - confidence
    - reasoning
    - key_factors

# Reasoning template
reasoning_template: |
  Rumah tangga ini dikategorikan sebagai {kategori} berdasarkan analisis berikut:
  
  **Kondisi Ekonomi:**
  - Pendapatan per kapita: Rp {pendapatan_perkapita:,}
  - Memiliki Tabungan: {tabungan}
  
  **Aset yang Dimiliki:**
  - Kendaraan: {motor} motor, {mobil} mobil
  - Elektronik: {kulkas} kulkas, {tv} TV, {mesin_cuci} mesin cuci
  
  **Kondisi Perumahan:**
  - Luas rumah: {luas_rumah} m²
  - Daya listrik: {daya_listrik} VA
  - Kelayakan rumah: {overall_kelayakan_rumah}
  
  **Faktor Kerentanan:**
  - {faktor_kerentanan}
  
  **Tingkat Kepercayaan:** {confidence}%

# Kategori mapping
categories:
  - name: "Sangat Miskin"
    code: "SM"
    priority: 1
    description: "Di bawah garis kemiskinan ekstrem"
    
  - name: "Miskin"
    code: "M"
    priority: 2
    description: "Di bawah garis kemiskinan"
    
  - name: "Rentan Miskin"
    code: "RM"
    priority: 3
    description: "Baru di atas garis kemiskinan, rentan jatuh kembali"
    
  - name: "Hampir Miskin"
    code: "HM"
    priority: 4
    description: "Mendekati garis kemiskinan dari atas"
    
  - name: "Menengah Bawah"
    code: "MB"
    priority: 5
    description: "Kesejahteraan menengah level bawah"
    
  - name: "Menengah Ke Atas"
    code: "MA"
    priority: 6
    description: "Kesejahteraan menengah level atas"